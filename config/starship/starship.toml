"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "arrow"
command_timeout = 1000

format = """
[](fg:bg4)$custom$username$hostname[](fg:bg4 bg:blue)$directory[](fg:blue bg:bg3)$git_branch$git_status$git_metrics[](fg:bg3)$fill[](fg:bg4)$time
$character"""


[custom.osicon]
description = 'OS icon from /etc/os-release (reliable across distros)'
when = true
shell = ['/bin/sh']
command = '''uname -s | grep -q Darwin && printf '󰀵' || { . /etc/os-release 2>/dev/null; case "$NAME" in *[Pp]arrot*) ID=parrot;; esac; case "$ID" in kali) printf '';; parrot) printf '';; ubuntu) printf '󰕈';; debian) printf '󰣚';; arch) printf '󰣇';; fedora) printf '󰣛';; *) printf '󰌽';; esac; }'''
format = '[ $output ](fg:fg bg:bg4)'

[username]
show_always = true
style_user = 'fg:fg bg:bg4'
style_root = 'fg:red bg:bg4'
format = '[$user]($style)'

[hostname]
ssh_only = false
trim_at = '.'
format = '[@$hostname ](fg:gray bg:bg4)'

[directory]
format = '[ 󰉋 $path ](fg:bg bg:blue)'
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
format = '[ $symbol$branch ](fg:yellow bg:bg3)'

[git_status]
format = '[$all_status ](fg:orange bg:bg3)'

[git_metrics]
disabled = false
format = '([+$added ](fg:green bg:bg3))([-$deleted ](fg:red bg:bg3))'

[time]
disabled = false
time_format = "%a %b %d  %H:%M"
format = '[ 󱑍 $time ](fg:fg bg:bg4)'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vicmd_symbol = '[❮](bold yellow)'

[fill]
symbol = " "

