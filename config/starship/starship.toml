"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "arrow"
command_timeout = 1000

format = """
[ŅéČ](fg:bg4)$custom$username$hostname[Ņé░](fg:bg4 bg:blue)$directory[Ņé░](fg:blue bg:bg3)$git_branch$git_status$git_metrics[Ņé░](fg:bg3)$fill[Ņé▓](fg:bg4)$time
$character"""


[custom.osicon]
description = 'OS icon from /etc/os-release (reliable across distros)'
when = true
shell = ['/bin/sh']
command = '''uname -s | grep -q Darwin && printf '¾░ĆĄ' || { . /etc/os-release 2>/dev/null; case "$NAME" in *[Pp]arrot*) ID=parrot;; esac; case "$ID" in kali) printf '’ī¦';; parrot) printf '’ī®';; ubuntu) printf '¾░Ģł';; debian) printf '¾░ŻÜ';; arch) printf '¾░Żć';; fedora) printf '¾░Żø';; *) printf '¾░īĮ';; esac; }'''
format = '[ $output ](fg:fg bg:bg4)'

[username]
show_always = true
style_user = 'fg:fg bg:bg4'
style_root = 'fg:red bg:bg4'
format = '[$user]($style)'

[hostname]
ssh_only = false
trim_at = '.'
format = '[@$hostname ](fg:gray bg:bg4)'

[directory]
format = '[ ¾░ēŗ $path ](fg:bg bg:blue)'
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[git_branch]
symbol = "’Éś "
format = '[ $symbol$branch ](fg:yellow bg:bg3)'

[git_status]
format = '[$all_status ](fg:orange bg:bg3)'

[git_metrics]
disabled = false
format = '([+$added ](fg:green bg:bg3))([-$deleted ](fg:red bg:bg3))'

[time]
disabled = false
time_format = "%a %b %d  %H:%M"
format = '[ ¾▒æŹ $time ](fg:fg bg:bg4)'

[character]
success_symbol = '[ŌØ»](bold green)'
error_symbol = '[ŌØ»](bold red)'
vicmd_symbol = '[ŌØ«](bold yellow)'

[fill]
symbol = " "

