source-file ~/.config/tmux/tmux.reset.conf

set-option -g default-terminal 'screen-256color'
set-option -ga terminal-overrides ',xterm-256color:RGB'

if-shell 'command -v nu >/dev/null 2>&1' 'set -g default-command nu'

set -g prefix ^A
set -g base-index 1
setw -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on
set -g status-position top
set -g status-interval 2
setw -g mode-keys vi

set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @continuum-restore 'off'
set -g @resurrect-strategy-nvim 'session'

run '~/.config/tmux/plugins/tpm/tpm'

set -g status-interval 5
set -g status-style "bg=default"
# Starship add_newline is off; this blank second line provides spacing inside tmux sessions only.
set -g status 2
set -g status-format[1] ""
set -g status-justify centre
set -g status-left-length 140
set -g status-right-length 200
set -g window-status-separator ""

set -g status-left "#[fg=#{@thm_bg4},bg=default]#[fg=#{@thm_fg},bg=#{@thm_bg4}]  #S #[fg=#{@thm_bg4},bg=default] #(~/.config/tmux/scripts/host.sh)"

setw -g window-status-format "#[fg=#{@thm_bg2},bg=default]#[fg=#{@thm_gray},bg=#{@thm_bg2}] #I #W #[fg=#{@thm_bg2},bg=default] "
setw -g window-status-current-format "#[fg=#{@thm_accent},bg=default]#[fg=#{@thm_bg},bg=#{@thm_accent}] #I #W #[fg=#{@thm_accent},bg=default] "

set -g status-right "#[fg=#{@thm_bg2},bg=default]#[fg=#{@thm_aqua},bg=#{@thm_bg2}] 󰓅 #(~/.config/tmux/scripts/net.sh) #[fg=#{@thm_bg2},bg=default] #[fg=#{@thm_bg2},bg=default]#[fg=#{@thm_yellow},bg=#{@thm_bg2}] 󰻠 #(~/.config/tmux/scripts/cpu.sh) #[fg=#{@thm_bg2},bg=default] #(~/.config/tmux/scripts/cloud-tmux.sh hetzner)#(~/.config/tmux/scripts/cloud-tmux.sh do)"

if-shell '[ -e ~/.config/tmux/theme.conf ]' 'source-file ~/.config/tmux/theme.conf' 'source-file ~/.config/tmux/themes/arrow.conf'
